name: Pull Request Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Start application
        run: |
          npm start > app.log 2>&1 &
          sleep 5

      - name: Check /api/hello with curl
        run: curl --fail http://127.0.0.1:3000/api/hello